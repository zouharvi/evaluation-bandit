[project]
name = "bandit-rank"
version = "0.0.0"
description = "Dynamic Contrastive Evaluation with Humans"
readme = "README.md"
license = { text = "apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Vilém Zouhar", email = "vilem.zouhar@gmail.com" }]
keywords = [
    "evaluation",
    "machine translation",
    "human evaluation",
    "annotation",
]
dependencies = [
]

[project.optional-dependencies]
dev = ["pytest"]

[project.urls]
Repository = "https://github.com/zouharvi/bandit-rank"
Issues = "https://github.com/zouharvi/bandit-rank/issues"

[tool.setuptools]
package-dir = { "bandit_rank" = "src" }
packages = ["bandit_rank"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

